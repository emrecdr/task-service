name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # Pin Hurl explicitly — release assets are version-named
  # (``hurl_<version>_amd64.deb``); the bare ``hurl_amd64.deb`` URL 404s.
  HURL_VERSION: 8.0.1

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      APP_ENV: test
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Pre-commit (ruff, ruff-format, bandit, file hygiene, uv lock --check)
        run: uv run pre-commit run --all-files

      - name: Typecheck
        run: uv run mypy

      - name: Pytest (unit + integration + contract, coverage gate)
        run: uv run pytest

      - name: Install Hurl
        run: |
          set -euo pipefail
          curl -fsSLo hurl.deb \
            "https://github.com/Orange-OpenSource/hurl/releases/download/${HURL_VERSION}/hurl_${HURL_VERSION}_amd64.deb"
          sudo dpkg -i hurl.deb
          hurl --version

      - name: Hurl E2E suite (--jobs 1 — Phase 1 StaticPool constraint)
        run: make hurl-e2e

      - name: Upload Hurl HTML report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: hurl-reports
          path: reports/hurl/
          if-no-files-found: warn
